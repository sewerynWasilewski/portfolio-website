<main class="page">
  <article class="card">
    @if (project; as selectedProject) {
      <section class="section-block">
        <a routerLink="/projects">← Back to projects</a>

        <h1>{{ selectedProject.title }}</h1>
        <p class="text">{{ selectedProject.description }}</p>
        <p class="text">{{ selectedProject.year }}</p>

        <div class="tag-list">
          @for (tech of selectedProject.technologies; track tech) {
            <a
              class="tag-item"
              [routerLink]="['/projects']"
              [queryParams]="{ tech: tech }"
            >
              {{ tech }}
            </a>
          }
        </div>
      </section>

      <section class="section-block">
        <app-markdown-renderer [content]="selectedProject.content"></app-markdown-renderer>
      </section>
    } @else {
      <section class="section-block">
        <h1>Project not found</h1>
        <a routerLink="/projects">Back to projects</a>
      </section>
    }
  </article>
</main>
